<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gunk Tracker — Commander</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #141414;
    --bg-card: #1a1a1a;
    --accent: #4a1c6b;
    --accent-light: #7b3fb3;
    --accent-glow: #9d5ce0;
    --text: #f0f0f0;
    --text-dim: #a0a0a0;
    --gunk: #b84dff;
    --gunk-bright: #d47aff;
    --clean: #888;
    --clean-bright: #bbb;
    --danger: #c0392b;
    --ok: #27ae60;
    --warn: #f39c12;
    --op1: #e74c3c;
    --op2: #3498db;
    --op3: #2ecc71;
    --tab-active: #222;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 16px; height: 100%; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* Screens */
  .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .screen.active { display: flex; }

  /* Setup */
  .setup-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
  .setup-title { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-align: center; background: linear-gradient(90deg, var(--gunk), var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .setup-sub { color: var(--text-dim); text-align: center; font-size: 14px; }
  .field { width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select {
    width: 100%; padding: 14px 16px; font-size: 17px; background: var(--bg-card); color: var(--text);
    border: 2px solid #2a2a2a; border-radius: 12px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent-light); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: 12px; padding: 16px 20px; font-size: 17px; font-weight: 700;
    cursor: pointer; color: #fff; background: var(--accent); min-height: 56px; min-width: 56px;
    transition: transform .08s, background .15s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); width: 100%; }
  .btn-primary:hover { background: linear-gradient(135deg, var(--accent-light), var(--accent-glow)); box-shadow: 0 4px 16px rgba(157,92,224,0.25); }
  .btn-secondary { background: #222; border: 2px solid #333; font-size: 15px; padding: 12px 14px; }
  .btn-secondary:hover { background: #2a2a2a; border-color: #444; }
  .btn-danger { background: linear-gradient(135deg, #a93226, var(--danger)); }
  .btn-warn { background: var(--warn); color: #000; }
  .btn-ok { background: linear-gradient(135deg, #1e8449, var(--ok)); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .seed-display { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; color: var(--accent-glow); word-break: break-all; text-align: center; }

  /* Opponent setup cards */
  .op-setup-card {
    background: var(--bg-card); border: 2px solid #2a2a2a; border-radius: 16px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .2s, box-shadow .2s;
  }
  .op-setup-card:hover { border-color: #3a3a3a; }
  .op-setup-card .op-color { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 6px currentColor; }

  /* Tabs */
  .tab-bar {
    display: flex; background: var(--bg-elev); border-bottom: 1px solid #222;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: 80px; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; background: transparent; color: var(--text-dim);
    border-bottom: 3px solid transparent; white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
  }
  .tab.active { color: var(--text); background: var(--tab-active); border-bottom-color: var(--accent-glow); }
  .tab .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px currentColor; }

  /* Header */
  .header {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px 12px;
    background: var(--bg-elev); border-bottom: 1px solid #222;
  }
  .stat { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat .val { font-size: 20px; font-weight: 800; }
  .stat .lbl { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
  .stat.gunk .val { color: var(--gunk); text-shadow: 0 0 10px rgba(184,77,255,0.3); }
  .stat-icon { width: 20px; height: 20px; opacity: 0.6; }

  /* Main body */
  .main-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  /* Card reveal */
  .reveal-box {
    background: var(--bg-card); border: 2px solid #2a2a2a; border-radius: 16px; padding: 16px;
    text-align: center; display: none; flex-direction: column; gap: 10px; align-items: center;
    animation: revealIn .3s ease-out;
  }
  .reveal-box.active { display: flex; }
  .reveal-title { font-size: 16px; font-weight: 700; }
  @keyframes revealIn { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* Card Art */
  .card-art {
    width: 100%; max-width: 260px; aspect-ratio: 200 / 280;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform .2s;
  }
  .card-art:hover { transform: translateY(-4px); }
  .card-art svg { width: 100%; height: 100%; display: block; }

  /* Mini card for hand */
  .mini-card {
    width: 42px; height: 58px; border-radius: 6px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    flex-shrink: 0;
    animation: miniPop .25s ease-out;
  }
  @keyframes miniPop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  .mini-card svg { width: 100%; height: 100%; display: block; }

  /* Panel card row */
  .panel-card-art {
    width: 100%; max-width: 180px; aspect-ratio: 200 / 280;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .panel-card-art svg { width: 100%; height: 100%; display: block; }

  /* Action grid */
  .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .actions .btn { width: 100%; font-size: 15px; padding: 14px 8px; }

  /* Panel */
  .panel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50;
    display: none; align-items: flex-end; justify-content: center;
  }
  .panel-overlay.active { display: flex; }
  .panel {
    background: var(--bg-elev); width: 100%; max-width: 600px; max-height: 92vh;
    border-radius: 20px 20px 0 0; padding: 16px; display: flex; flex-direction: column; gap: 10px;
    border-top: 2px solid var(--accent);
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .panel-header { display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 18px; font-weight: 800; }
  .panel-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .panel-footer { display: flex; gap: 10px; }
  .panel-footer .btn { flex: 1; }

  /* Virtual cards */
  .vstack { display: flex; flex-direction: column; gap: 10px; }
  .vcard {
    display: flex; align-items: center; gap: 10px; background: var(--bg-card);
    border: 2px solid #2a2a2a; border-radius: 14px; padding: 12px;
    transition: border-color .15s;
  }
  .vcard:hover { border-color: #3a3a3a; }
  .vcard.gunk-card { border-color: rgba(184,77,255,0.4); }
  .vcard.clean-card { border-color: rgba(136,136,136,0.25); }
  .vcard-info { flex: 1; }
  .vcard-type { font-size: 15px; font-weight: 700; }
  .vcard-type.gunk-text { color: var(--gunk); }
  .vcard-type.clean-text { color: var(--clean); }
  .vcard-actions { display: flex; gap: 8px; }
  .vcard-actions .btn { padding: 10px 12px; font-size: 13px; min-height: 44px; }

  .reorder { display: flex; gap: 6px; flex-direction: column; }
  .reorder button { width: 40px; height: 40px; border-radius: 10px; border: 2px solid #333; background: #222; color: var(--text); font-size: 18px; transition: all .1s; }
  .reorder button:active { background: #333; transform: scale(0.95); }
  .reorder button:disabled { opacity: 0.3; }

  /* Gunk hand */
  .gunk-hand {
    background: var(--bg-card); border: 2px solid #2a2a2a; border-radius: 16px; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .gunk-hand-title { font-size: 15px; font-weight: 700; color: var(--gunk); display: flex; align-items: center; gap: 8px; }
  .gunk-hand-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 58px; }
  .gunk-hand .btn { font-size: 14px; padding: 12px 14px; }

  /* History */
  .history-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
  .history-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
  .history { flex: 1; overflow-y: auto; background: var(--bg-elev); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .history-entry { font-size: 12px; padding: 8px 10px; background: var(--bg-card); border-radius: 10px; border-left: 4px solid var(--accent-light); animation: histIn .2s ease-out; }
  @keyframes histIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .history-entry .time { color: var(--text-dim); font-size: 10px; margin-right: 6px; }
  .history-entry .op-tag { font-weight: 700; margin-right: 4px; }

  /* End screen */
  .end-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
  .end-title { font-size: 22px; font-weight: 800; text-align: center; }
  .op-end-card { background: var(--bg-card); border-radius: 14px; padding: 14px; border: 2px solid #2a2a2a; }
  .op-end-card .op-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { background: var(--bg-elev); border-radius: 12px; padding: 12px; text-align: center; }
  .stat-card .num { font-size: 22px; font-weight: 800; color: var(--accent-glow); }
  .stat-card .desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Tutor */
  .tutor-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tutor-item { padding: 12px; border-radius: 12px; border: 2px solid #2a2a2a; background: var(--bg-card); text-align: center; font-weight: 700; cursor: pointer; font-size: 14px; transition: all .1s; }
  .tutor-item.gunk-text { color: var(--gunk); border-color: rgba(184,77,255,0.4); }
  .tutor-item.clean-text { color: var(--clean); border-color: rgba(136,136,136,0.3); }
  .tutor-item:active { transform: scale(0.97); }
  .tutor-item:hover { border-color: #444; }

  /* Bottom action bar */
  .bottom-bar {
    display: flex; gap: 8px; padding: 10px 12px; background: var(--bg-elev);
    border-top: 1px solid #222;
  }
  .bottom-bar .btn { flex: 1; font-size: 14px; padding: 12px 8px; min-height: 48px; }

  /* Helpers */
  .flex-row { display: flex; gap: 10px; align-items: center; }
  .flex-1 { flex: 1; }
  .text-dim { color: var(--text-dim); }
  .mt-4 { margin-top: 4px; }
  .mb-4 { margin-bottom: 4px; }

  /* Tablet layout: 2-column when wide enough */
  @media (min-width: 768px) {
    .setup-wrap { max-width: 700px; margin: 0 auto; }
    .op-setup-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .actions { grid-template-columns: repeat(4, 1fr); }
    .end-wrap { max-width: 700px; margin: 0 auto; }
    .tab-bar { justify-content: center; }
    .tab { min-width: 120px; font-size: 14px; padding: 14px 16px; }
    .card-art { max-width: 300px; }
  }
  @media (min-width: 1024px) {
    .op-setup-grid { grid-template-columns: repeat(3, 1fr); }
    .actions { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div id="setup-screen" class="screen active">
    <div class="setup-wrap">
      <div class="setup-title">GUNK TRACKER</div>
      <div class="setup-sub">Commander edition. Track Gunk across multiple opponents.</div>

      <div style="display:flex; gap:12px; justify-content:center; align-items:center; margin: 8px 0;">
        <div id="setup-preview-gunk" style="width:100px;"></div>
        <div id="setup-preview-clean" style="width:100px;"></div>
      </div>

      <div class="field">
        <label for="op-count">Number of Opponents</label>
        <select id="op-count">
          <option value="1">1 Opponent</option>
          <option value="2" selected>2 Opponents</option>
          <option value="3">3 Opponents</option>
        </select>
      </div>

      <div id="op-setup-list" class="op-setup-grid"></div>

      <button id="btn-setup" class="btn btn-primary">Start Game</button>
      <div id="setup-seed" class="seed-display"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen" class="screen">
    <div class="tab-bar" id="tab-bar"></div>
    <div class="header">
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h5"/></svg>
        <div id="s-lib" class="val">0</div>
        <div class="lbl">Library</div>
      </div>
      <div class="stat gunk">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gunk)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <div id="s-gunk-lib" class="val">0</div>
        <div class="lbl">Gunk in Lib</div>
      </div>
      <div class="stat gunk">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="var(--gunk)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <div id="s-gunk-hand" class="val">0</div>
        <div class="lbl">Gunk Hand</div>
      </div>
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <div id="s-gunk-gy" class="val">0</div>
        <div class="lbl">Gunk GY</div>
      </div>
    </div>

    <div class="main-body">
      <div id="reveal-box" class="reveal-box">
        <div id="reveal-title" class="reveal-title"></div>
        <div id="reveal-card"></div>
        <div id="reveal-actions" class="flex-row"></div>
      </div>

      <div class="actions">
        <button id="btn-draw" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          DRAW
        </button>
        <button id="btn-surveil" class="btn btn-secondary">SURVEIL X</button>
        <button id="btn-scry" class="btn btn-secondary">SCRY X</button>
        <button id="btn-mill" class="btn btn-secondary">MILL X</button>
        <button id="btn-shuffle" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
          SHUFFLE
        </button>
        <button id="btn-tutor" class="btn btn-secondary">TUTOR</button>
        <button id="btn-add-gunk" class="btn btn-secondary" style="border-color:rgba(184,77,255,0.3);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gunk)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          ADD GUNK
        </button>
        <button id="btn-op-end" class="btn btn-danger">OPP OUT</button>
      </div>

      <div class="gunk-hand">
        <div class="gunk-hand-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <span id="gunk-hand-title">Gunk in Hand</span>
        </div>
        <div class="gunk-hand-row" id="gunk-chips"></div>
        <div class="flex-row">
          <button id="btn-cycle" class="btn btn-secondary flex-1">Cycle Gunk for {4}</button>
        </div>
      </div>

      <div class="history-wrap">
        <div class="history-title">History</div>
        <div id="history" class="history"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button id="btn-global-end" class="btn btn-danger">End Game</button>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen" class="screen">
    <div class="end-wrap">
      <div class="end-title">Game Over</div>
      <div id="end-op-list"></div>
      <div id="end-seed" class="seed-display"></div>
      <button id="btn-new" class="btn btn-primary">New Game</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel-overlay" class="panel-overlay">
    <div class="panel">
      <div class="panel-header">
        <div id="panel-title" class="panel-title">Panel</div>
        <button id="panel-close" class="btn btn-secondary" style="padding:8px 12px; min-height:40px; font-size:14px;">Close</button>
      </div>
      <div id="panel-input-row" class="flex-row">
        <input id="panel-input" type="number" inputmode="numeric" value="1" min="1" max="999" class="field" style="max-width:none;">
        <button id="panel-look" class="btn btn-primary" style="width:auto; padding:14px 20px;">Look</button>
      </div>
      <div id="panel-body" class="panel-body"></div>
      <div id="panel-footer" class="panel-footer"></div>
    </div>
  </div>

  <!-- CUSTOM PROMPT MODAL -->
  <div id="prompt-overlay" class="panel-overlay">
    <div class="panel" style="max-height:40vh; border-top-color:var(--gunk);">
      <div class="panel-header">
        <div id="prompt-title" class="panel-title" style="color:var(--gunk);">Add Gunk</div>
        <button id="prompt-close" class="btn btn-secondary" style="padding:8px 12px; min-height:40px; font-size:14px;">Cancel</button>
      </div>
      <div class="panel-body" style="justify-content:center;">
        <div class="field" style="max-width:none;">
          <label id="prompt-label">How many Gunk cards?</label>
          <input id="prompt-input" type="number" inputmode="numeric" value="3" min="1" max="999" style="font-size:20px; padding:16px;">
        </div>
      </div>
      <div class="panel-footer">
        <button id="prompt-cancel" class="btn btn-secondary" style="flex:1;">Cancel</button>
        <button id="prompt-confirm" class="btn btn-primary" style="flex:2;">Add Gunk</button>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  // ========== SVG CARD GENERATORS ==========
  function gunkCardSVG(w, h, showText) {
    w = w || 200; h = h || 280;
    var text = showText !== false ? '<text x="'+(w/2)+'" y="'+(h/2+6)+'" text-anchor="middle" fill="#b84dff" font-size="'+(w*0.14)+'" font-weight="900" filter="url(#glow'+(w)+')" style="letter-spacing:2px;">GUNK</text>' : '';
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">' +
      '<defs>' +
        '<linearGradient id="ggrad'+w+'" x1="0%" y1="0%" x2="100%" y2="100%">' +
          '<stop offset="0%" stop-color="#1a0529"/>' +
          '<stop offset="40%" stop-color="#2d0a4a"/>' +
          '<stop offset="100%" stop-color="#0d0218"/>' +
        '</linearGradient>' +
        '<linearGradient id="slime'+w+'" x1="0%" y1="0%" x2="0%" y2="100%">' +
          '<stop offset="0%" stop-color="#d47aff" stop-opacity="0.7"/>' +
          '<stop offset="100%" stop-color="#b84dff" stop-opacity="0.2"/>' +
        '</linearGradient>' +
        '<filter id="glow'+w+'"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
        '<filter id="slimeGlow'+w+'"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
      '</defs>' +
      '<rect x="2" y="2" width="'+(w-4)+'" height="'+(h-4)+'" rx="'+(w*0.06)+'" fill="url(#ggrad'+w+')" stroke="#b84dff" stroke-width="2.5"/>' +
      '<path d="M'+(w*0.08)+',2 Q'+(w*0.12)+','+(h*0.12)+' '+(w*0.18)+',2 Q'+(w*0.24)+','+(h*0.18)+' '+(w*0.30)+',2" fill="none" stroke="#d47aff" stroke-width="2" opacity="0.5" filter="url(#slimeGlow'+w+')"/>' +
      '<path d="M'+(w*0.55)+',2 Q'+(w*0.62)+','+(h*0.15)+' '+(w*0.70)+',2 Q'+(w*0.78)+','+(h*0.20)+' '+(w*0.85)+',2" fill="none" stroke="#d47aff" stroke-width="2" opacity="0.4" filter="url(#slimeGlow'+w+')"/>' +
      '<ellipse cx="'+(w*0.75)+'" cy="'+(h*0.72)+'" rx="'+(w*0.12)+'" ry="'+(h*0.08)+'" fill="#b84dff" opacity="0.15"/>' +
      '<ellipse cx="'+(w*0.25)+'" cy="'+(h*0.82)+'" rx="'+(w*0.08)+'" ry="'+(h*0.06)+'" fill="#d47aff" opacity="0.12"/>' +
      '<circle cx="'+(w*0.20)+'" cy="'+(h*0.30)+'" r="'+(w*0.03)+'" fill="#d47aff" opacity="0.3"/>' +
      '<circle cx="'+(w*0.80)+'" cy="'+(h*0.25)+'" r="'+(w*0.04)+'" fill="#b84dff" opacity="0.25"/>' +
      '<circle cx="'+(w*0.50)+'" cy="'+(h*0.15)+'" r="'+(w*0.025)+'" fill="#d47aff" opacity="0.35"/>' +
      text +
    '</svg>';
  }

  function cleanCardSVG(w, h, showText) {
    w = w || 200; h = h || 280;
    var text = showText !== false ? '<text x="'+(w/2)+'" y="'+(h/2+6)+'" text-anchor="middle" fill="#888" font-size="'+(w*0.12)+'" font-weight="700" style="letter-spacing:1px;">CLEAN</text>' : '';
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">' +
      '<defs>' +
        '<linearGradient id="cgrad'+w+'" x1="0%" y1="0%" x2="100%" y2="100%">' +
          '<stop offset="0%" stop-color="#2a2a2a"/>' +
          '<stop offset="100%" stop-color="#151515"/>' +
        '</linearGradient>' +
        '<pattern id="cpat'+w+'" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">' +
          '<circle cx="10" cy="10" r="1" fill="#333" opacity="0.3"/>' +
        '</pattern>' +
      '</defs>' +
      '<rect x="2" y="2" width="'+(w-4)+'" height="'+(h-4)+'" rx="'+(w*0.06)+'" fill="url(#cgrad'+w+')" stroke="#555" stroke-width="2"/>' +
      '<rect x="6" y="6" width="'+(w-12)+'" height="'+(h-12)+'" rx="'+(w*0.04)+'" fill="url(#cpat'+w+')"/>' +
      '<line x1="'+(w*0.15)+'" y1="'+(h*0.12)+'" x2="'+(w*0.85)+'" y2="'+(h*0.12)+'" stroke="#444" stroke-width="1" opacity="0.5"/>' +
      '<line x1="'+(w*0.15)+'" y1="'+(h*0.88)+'" x2="'+(w*0.85)+'" y2="'+(h*0.88)+'" stroke="#444" stroke-width="1" opacity="0.5"/>' +
      text +
    '</svg>';
  }

  function cardArtHTML(type, size) {
    size = size || 'large';
    var w = size === 'large' ? 260 : (size === 'panel' ? 180 : 42);
    var h = size === 'large' ? 364 : (size === 'panel' ? 252 : 58);
    var cls = size === 'large' ? 'card-art' : (size === 'panel' ? 'panel-card-art' : 'mini-card');
    var svg = type === 'gunk' ? gunkCardSVG(w, h) : cleanCardSVG(w, h);
    return '<div class="'+cls+'">' + svg + '</div>';
  }

  // ========== PRNG ==========
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function seedFromString(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return h >>> 0;
  }

  var OPP_COLORS = ['var(--op1)','var(--op2)','var(--op3)'];
  var OPP_NAMES = ['Opponent 1','Opponent 2','Opponent 3'];

  // ========== State ==========
  var opponents = [];
  var activeOp = 0;
  var panelMode = '';
  var panelCards = [];
  var panelResult = [];

  function newOpponent(idx, name, libSize, gunkCount) {
    var seedNum = (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0);
    var rng = mulberry32(seedNum);
    var lib = [];
    var id = 1;
    for (var i=0;i<libSize;i++) lib.push({ id: id++, type: 'clean' });
    for (var i=0;i<gunkCount;i++) lib.push({ id: id++, type: 'gunk' });
    shuffleInPlace(lib, rng);
    return {
      idx: idx,
      name: name || OPP_NAMES[idx],
      color: OPP_COLORS[idx % OPP_COLORS.length],
      library: lib,
      handGunk: 0,
      graveyardGunk: 0,
      graveyardClean: 0,
      exiled: [],
      drawCount: 0,
      eliminated: false,
      seed: seedNum.toString(16).toUpperCase().padStart(8,'0'),
      gunkDrawnTotal: 0,
      gunkCycledTotal: 0,
      cardsRemovedTotal: 0,
      history: []
    };
  }

  function shuffleInPlace(arr, rng) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
  }
  function countGunk(arr){ return arr.filter(function(c){ return c.type==='gunk'; }).length; }

  // ========== DOM ==========
  function $(id){ return document.getElementById(id); }
  function showScreen(name) {
    ['setup-screen','main-screen','end-screen'].forEach(function(id){ $(id).classList.toggle('active', id === name+'-screen'); });
  }

  // ========== Setup UI ==========
  function renderOpSetup() {
    var count = parseInt($('op-count').value, 10) || 2;
    var box = $('op-setup-list');
    box.innerHTML = '';
    for (var i=0;i<count;i++) {
      var card = document.createElement('div');
      card.className = 'op-setup-card';
      card.innerHTML =
        '<div style="font-weight:700; font-size:15px; display:flex; align-items:center;">' +
          '<span class="op-color" style="background:' + OPP_COLORS[i] + ';"></span>' +
          OPP_NAMES[i] +
        '</div>' +
        '<div class="field"><label>Name</label><input type="text" id="op-name-' + i + '" value="' + OPP_NAMES[i] + '" placeholder="Name"></div>' +
        '<div class="field"><label>Library Size</label><input type="number" id="op-lib-' + i + '" value="40" min="0" max="999"></div>' +
        '<div class="field"><label>Gunk to Shuffle In</label><input type="number" id="op-gunk-' + i + '" value="3" min="0" max="999"></div>' +
        '<div class="field"><label>Custom Seed (optional)</label><input type="text" id="op-seed-' + i + '" placeholder="Random" autocomplete="off"></div>';
      box.appendChild(card);
    }
  }

  // Show card previews on setup
  $('setup-preview-gunk').innerHTML = cardArtHTML('gunk', 'panel');
  $('setup-preview-clean').innerHTML = cardArtHTML('clean', 'panel');

  $('op-count').addEventListener('change', renderOpSetup);
  renderOpSetup();

  $('btn-setup').addEventListener('click', function() {
    var count = parseInt($('op-count').value, 10) || 2;
    opponents = [];
    for (var i=0;i<count;i++) {
      var name = $('op-name-'+i).value.trim() || OPP_NAMES[i];
      var libSize = parseInt($('op-lib-'+i).value, 10) || 0;
      var gunkCount = parseInt($('op-gunk-'+i).value, 10) || 0;
      var custom = $('op-seed-'+i).value.trim();
      var seedNum;
      if (custom) seedNum = seedFromString(custom);
      else seedNum = (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0);
      var rng = mulberry32(seedNum);
      var lib = [];
      var nid = 1;
      for (var j=0;j<libSize;j++) lib.push({ id: nid++, type: 'clean' });
      for (var j=0;j<gunkCount;j++) lib.push({ id: nid++, type: 'gunk' });
      shuffleInPlace(lib, rng);
      opponents.push({
        idx: i, name: name, color: OPP_COLORS[i % OPP_COLORS.length],
        library: lib, handGunk: 0, graveyardGunk: 0, graveyardClean: 0,
        exiled: [], drawCount: 0, eliminated: false,
        seed: seedNum.toString(16).toUpperCase().padStart(8,'0'),
        gunkDrawnTotal: 0, gunkCycledTotal: 0, cardsRemovedTotal: 0,
        history: [{ time: formatTime(), text: 'Shuffled ' + gunkCount + ' Gunk into library of ' + libSize + ' (Seed: ' + seedNum.toString(16).toUpperCase().padStart(8,'0') + ')' }]
      });
    }
    activeOp = 0;
    buildTabs();
    switchOp(0);
    showScreen('main');
  });

  // ========== Tabs ==========
  function buildTabs() {
    var bar = $('tab-bar');
    bar.innerHTML = '';
    opponents.forEach(function(op, idx) {
      var tab = document.createElement('button');
      tab.className = 'tab' + (idx === activeOp ? ' active' : '');
      tab.innerHTML = '<span class="dot" style="background:' + op.color + ';"></span>' + escapeHtml(op.name);
      if (op.eliminated) tab.style.opacity = '0.5';
      tab.onclick = function() { switchOp(idx); };
      bar.appendChild(tab);
    });
  }

  function switchOp(idx) {
    activeOp = idx;
    var tabs = $('tab-bar').children;
    for (var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active', i === idx);
    hideReveal();
    closePanel();
    updateHeader();
    renderGunkHand();
    renderHistory();
    $('gunk-hand-title').textContent = opponents[idx].name + ' — Gunk in Hand';
  }

  // ========== Rendering ==========
  function op() { return opponents[activeOp]; }

  function updateHeader() {
    var o = op();
    $('s-lib').textContent = o.library.length;
    $('s-gunk-lib').textContent = countGunk(o.library);
    $('s-gunk-hand').textContent = o.handGunk;
    $('s-gunk-gy').textContent = o.graveyardGunk;
  }

  function renderHistory() {
    var el = $('history');
    el.innerHTML = '';
    op().history.forEach(function(entry){
      var d = document.createElement('div');
      d.className = 'history-entry';
      d.innerHTML = '<span class="time">' + entry.time + '</span><span class="op-tag" style="color:' + op().color + '">' + escapeHtml(op().name) + '</span>' + escapeHtml(entry.text);
      el.appendChild(d);
    });
  }

  function globalHistory(msg) {
    opponents.forEach(function(o) {
      o.history.unshift({ time: formatTime(), text: msg });
    });
    renderHistory();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatTime() {
    var d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0');
  }

  function renderGunkHand() {
    var box = $('gunk-chips');
    box.innerHTML = '';
    var o = op();
    for (var i=0;i<o.handGunk;i++) {
      var wrap = document.createElement('div');
      wrap.innerHTML = cardArtHTML('gunk', 'mini');
      box.appendChild(wrap.firstElementChild);
    }
    if (o.handGunk === 0) {
      var e = document.createElement('span');
      e.className = 'text-dim'; e.textContent = 'No Gunk in hand';
      box.appendChild(e);
    }
  }

  function showReveal(title, cardHTML, actionsHtml) {
    $('reveal-title').textContent = title || '';
    $('reveal-card').innerHTML = cardHTML || '';
    $('reveal-actions').innerHTML = actionsHtml || '';
    $('reveal-box').classList.add('active');
  }
  function hideReveal() {
    $('reveal-box').classList.remove('active');
  }

  function logOp(msg) {
    var o = op();
    o.history.unshift({ time: formatTime(), text: msg });
    renderHistory();
  }

  // ========== Draw ==========
  $('btn-draw').addEventListener('click', function() {
    hideReveal();
    var o = op();
    if (o.eliminated) { showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    if (o.library.length === 0) {
      showReveal('Draw', '<div style="color:var(--danger); font-weight:700;">Library empty!</div>', '');
      logOp('Draw: Library empty');
      return;
    }
    o.drawCount++;
    var card = o.library.shift();
    var isGunk = card.type === 'gunk';
    var html = cardArtHTML(card.type, 'large');
    var actions = '';
    if (isGunk) {
      actions = '<button id="add-hand" class="btn btn-primary">Add to Hand</button>';
    }
    showReveal('Draw #' + o.drawCount, html, actions);
    logOp('Draw #' + o.drawCount + ': ' + (isGunk?'GUNK':'Clean'));
    updateHeader();

    if (isGunk) {
      $('add-hand').addEventListener('click', function() {
        o.handGunk++;
        o.gunkDrawnTotal++;
        hideReveal();
        renderGunkHand();
        updateHeader();
        logOp('Gunk added to hand');
      });
    }
  });

  // ========== Panel helpers ==========
  function openPanel(title, mode) {
    panelMode = mode;
    $('panel-title').textContent = title;
    $('panel-overlay').classList.add('active');
    $('panel-body').innerHTML = '';
    $('panel-footer').innerHTML = '';
    var showInput = (mode === 'surveil' || mode === 'scry' || mode === 'mill');
    $('panel-input-row').style.display = showInput ? 'flex' : 'none';
    if (showInput) { $('panel-input').value = '1'; $('panel-input').focus(); }
  }
  function closePanel() { $('panel-overlay').classList.remove('active'); }
  $('panel-close').addEventListener('click', closePanel);

  function makeVCard(card, index, opts) {
    opts = opts || {};
    var div = document.createElement('div');
    div.className = 'vcard ' + (card.type==='gunk'?'gunk-card':'clean-card');

    var artWrap = document.createElement('div');
    artWrap.innerHTML = cardArtHTML(card.type, 'panel');
    div.appendChild(artWrap.firstElementChild);

    var info = document.createElement('div');
    info.className = 'vcard-info';
    var type = document.createElement('div');
    type.className = 'vcard-type ' + (card.type==='gunk'?'gunk-text':'clean-text');
    type.textContent = (card.type==='gunk'?'GUNK':'Clean') + ' (#' + card.id + ')';
    info.appendChild(type);
    div.appendChild(info);

    if (opts.reorder) {
      var re = document.createElement('div');
      re.className = 'reorder';
      var up = document.createElement('button'); up.textContent = '▲'; up.disabled = index === 0;
      up.onclick = function(){ opts.onMove(index, -1); };
      var dn = document.createElement('button'); dn.textContent = '▼'; dn.disabled = index === panelResult.length-1;
      dn.onclick = function(){ opts.onMove(index, 1); };
      re.appendChild(up); re.appendChild(dn);
      div.appendChild(re);
    }
    if (opts.reorderIndex !== undefined) {
      var re = document.createElement('div');
      re.className = 'reorder';
      var up = document.createElement('button'); up.textContent = '▲'; up.disabled = opts.reorderIndex === 0;
      up.onclick = function(){ opts.onMove(opts.reorderIndex, -1); };
      var dn = document.createElement('button'); dn.textContent = '▼'; dn.disabled = opts.reorderIndex === opts.reorderCount-1;
      dn.onclick = function(){ opts.onMove(opts.reorderIndex, 1); };
      re.appendChild(up); re.appendChild(dn);
      div.appendChild(re);
    }

    if (opts.actions) {
      var acts = document.createElement('div');
      acts.className = 'vcard-actions';
      opts.actions.forEach(function(a){
        var b = document.createElement('button');
        b.className = 'btn ' + (a.className || 'btn-secondary');
        b.textContent = a.label;
        b.onclick = a.onClick;
        acts.appendChild(b);
      });
      div.appendChild(acts);
    }
    return div;
  }

  // ========== Surveil ==========
  $('btn-surveil').addEventListener('click', function() { openPanel('Surveil', 'surveil'); });

  function doSurveilLook() {
    var o = op();
    if (o.eliminated) { closePanel(); showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    var n = Math.min(parseInt($('panel-input').value,10)||0, o.library.length);
    panelCards = o.library.slice(0, n);
    panelResult = panelCards.map(function(c,i){ return { card: c, toGraveyard: false, index: i }; });
    renderSurveil();
  }

  function renderSurveil() {
    var body = $('panel-body');
    body.innerHTML = '';
    if (panelResult.length === 0) { body.textContent = 'No cards to surveil.'; return; }
    var stack = document.createElement('div');
    stack.className = 'vstack';
    panelResult.forEach(function(item, idx){
      var keptIndex = panelResult.filter(function(x){ return !x.toGraveyard; }).indexOf(item);
      var keptCount = panelResult.filter(function(x){ return !x.toGraveyard; }).length;
      var opts = {
        actions: [
          { label: item.toGraveyard ? 'To Graveyard ✓' : 'To Graveyard', className: item.toGraveyard ? 'btn-ok' : 'btn-secondary', onClick: function(){ item.toGraveyard = true; renderSurveil(); } },
          { label: !item.toGraveyard ? 'Keep ✓' : 'Keep on Lib', className: !item.toGraveyard ? 'btn-primary' : 'btn-secondary', onClick: function(){ item.toGraveyard = false; renderSurveil(); } }
        ],
        reorder: false,
        reorderIndex: !item.toGraveyard ? keptIndex : undefined,
        reorderCount: keptCount,
        onMove: function(ki, dir) {
          var kept = panelResult.filter(function(x){ return !x.toGraveyard; });
          var gy = panelResult.filter(function(x){ return x.toGraveyard; });
          if (dir === -1 && ki > 0) { var t=kept[ki]; kept[ki]=kept[ki-1]; kept[ki-1]=t; }
          else if (dir === 1 && ki < kept.length-1) { var t=kept[ki]; kept[ki]=kept[ki+1]; kept[ki+1]=t; }
          panelResult = gy.concat(kept);
          renderSurveil();
        }
      };
      stack.appendChild(makeVCard(item.card, idx, opts));
    });
    body.appendChild(stack);

    var foot = $('panel-footer');
    foot.innerHTML = '';
    var conf = document.createElement('button');
    conf.className = 'btn btn-primary';
    conf.textContent = 'Confirm Surveil';
    conf.onclick = applySurveil;
    foot.appendChild(conf);
  }

  function applySurveil() {
    var o = op();
    var gy = [];
    var kept = [];
    panelResult.forEach(function(item){ if(item.toGraveyard) gy.push(item.card); else kept.push(item.card); });
    o.library.splice(0, panelCards.length);
    o.library = kept.concat(o.library);
    gy.forEach(function(c){ if(c.type==='gunk') o.graveyardGunk++; else o.graveyardClean++; });
    var parts = panelResult.map(function(item){
      return (item.card.type==='gunk'?'Gunk':'Clean') + ' → ' + (item.toGraveyard?'GY':'Lib');
    });
    logOp('Surveil ' + panelCards.length + ': ' + parts.join(', '));
    updateHeader();
    closePanel();
  }

  // ========== Scry ==========
  $('btn-scry').addEventListener('click', function() { openPanel('Scry', 'scry'); });

  function doScryLook() {
    var o = op();
    if (o.eliminated) { closePanel(); showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    var n = Math.min(parseInt($('panel-input').value,10)||0, o.library.length);
    panelResult = o.library.slice(0, n);
    renderScry();
  }

  function renderScry() {
    var body = $('panel-body'); body.innerHTML = '';
    if (panelResult.length === 0) { body.textContent = 'No cards to scry.'; return; }
    var stack = document.createElement('div'); stack.className = 'vstack';
    panelResult.forEach(function(card, idx){
      var opts = {
        reorder: true,
        onMove: function(i, dir){
          if (dir === -1 && i > 0) { var t=panelResult[i]; panelResult[i]=panelResult[i-1]; panelResult[i-1]=t; }
          else if (dir === 1 && i < panelResult.length-1) { var t=panelResult[i]; panelResult[i]=panelResult[i+1]; panelResult[i+1]=t; }
          renderScry();
        }
      };
      stack.appendChild(makeVCard(card, idx, opts));
    });
    body.appendChild(stack);
    var foot = $('panel-footer'); foot.innerHTML = '';
    var conf = document.createElement('button'); conf.className='btn btn-primary'; conf.textContent='Confirm Scry';
    conf.onclick = applyScry; foot.appendChild(conf);
  }

  function applyScry() {
    var o = op();
    var n = panelResult.length;
    o.library.splice(0, n);
    o.library = panelResult.concat(o.library);
    logOp('Scry ' + n + ': reordered top ' + n);
    closePanel();
  }

  // ========== Mill ==========
  $('btn-mill').addEventListener('click', function() { openPanel('Mill', 'mill'); });

  function doMillLook() {
    var o = op();
    if (o.eliminated) { closePanel(); showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    var n = Math.min(parseInt($('panel-input').value,10)||0, o.library.length);
    panelResult = o.library.slice(0, n);
    renderMill();
  }

  function renderMill() {
    var body = $('panel-body'); body.innerHTML = '';
    if (panelResult.length === 0) { body.textContent = 'No cards to mill.'; return; }
    var gunkMilled = countGunk(panelResult);
    var info = document.createElement('div');
    info.innerHTML = '<strong>Milling ' + panelResult.length + '</strong> — Gunk milled: <span style="color:var(--gunk)">' + gunkMilled + '</span>';
    body.appendChild(info);
    var stack = document.createElement('div'); stack.className = 'vstack';
    panelResult.forEach(function(card, idx){
      stack.appendChild(makeVCard(card, idx, {}));
    });
    body.appendChild(stack);
    var foot = $('panel-footer'); foot.innerHTML = '';
    var conf = document.createElement('button'); conf.className='btn btn-primary'; conf.textContent='Confirm Mill';
    conf.onclick = applyMill; foot.appendChild(conf);
  }

  function applyMill() {
    var o = op();
    var n = panelResult.length;
    var removed = o.library.splice(0, n);
    var gunkMilled = 0;
    removed.forEach(function(c){ if(c.type==='gunk'){ o.graveyardGunk++; gunkMilled++; } else o.graveyardClean++; });
    o.cardsRemovedTotal += removed.length;
    logOp('Mill ' + n + ': ' + gunkMilled + ' Gunk, ' + (n-gunkMilled) + ' Clean to GY');
    updateHeader();
    closePanel();
  }

  // ========== Tutor ==========
  $('btn-tutor').addEventListener('click', function() {
    var o = op();
    if (o.eliminated) { showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    openPanel('Tutor — Choose a card to fetch', 'tutor');
    $('panel-body').innerHTML = '';
    if (o.library.length === 0) { $('panel-body').textContent = 'Library is empty.'; return; }
    var list = document.createElement('div'); list.className = 'tutor-list';
    o.library.forEach(function(card, idx){
      var item = document.createElement('div');
      item.className = 'tutor-item ' + (card.type==='gunk'?'gunk-text':'clean-text');
      item.textContent = (card.type==='gunk'?'GUNK':'Clean') + ' #' + card.id;
      item.addEventListener('click', function(){
        var fetched = o.library.splice(idx, 1)[0];
        o.cardsRemovedTotal++;
        logOp('Tutored: ' + (fetched.type==='gunk'?'GUNK':'Clean') + ' #' + fetched.id);
        updateHeader();
        closePanel();
      });
      list.appendChild(item);
    });
    $('panel-body').appendChild(list);
  });

  // ========== Shuffle Library ==========
  $('btn-shuffle').addEventListener('click', function() {
    var o = op();
    if (o.eliminated) { showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    if (o.library.length === 0) { logOp('Shuffle: Library empty'); return; }
    var seedNum = (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0);
    var seedHex = seedNum.toString(16).toUpperCase().padStart(8,'0');
    o.seed = seedHex;
    var rng = mulberry32(seedNum);
    shuffleInPlace(o.library, rng);
    logOp('Shuffled library (Seed: ' + seedHex + ')');
    showReveal('Shuffled', cardArtHTML('clean', 'large') + '<div class="seed-display" style="margin-top:8px;">Seed: ' + seedHex + '</div>', '');
    setTimeout(hideReveal, 2000);
    updateHeader();
  });

  // ========== Cycle Gunk ==========
  $('btn-cycle').addEventListener('click', function() {
    var o = op();
    if (o.eliminated) { showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    if (o.handGunk <= 0) return;
    o.handGunk--;
    o.gunkCycledTotal++;
    renderGunkHand();
    updateHeader();
    logOp('Cycled Gunk for {4}');

    if (o.library.length === 0) {
      logOp('Cycle: Library empty, no replacement');
      showReveal('Cycle', '<div style="color:var(--danger); font-weight:700;">Library empty — no replacement draw</div>', '');
      return;
    }
    var card = o.library.shift();
    if (card.type === 'gunk') {
      o.handGunk++;
      o.gunkDrawnTotal++;
      renderGunkHand();
      updateHeader();
      showReveal('Cycle Replacement', cardArtHTML('gunk', 'large') + '<div style="color:var(--gunk); font-weight:700; margin-top:8px;">Cycled into another GUNK!</div>', '');
      logOp('Cycle replacement: GUNK');
    } else {
      showReveal('Cycle Replacement', cardArtHTML('clean', 'large'), '');
      logOp('Cycle replacement: Clean');
    }
  });

  // ========== Opponent Eliminated ==========
  $('btn-op-end').addEventListener('click', function() {
    var o = op();
    if (confirm('Eliminate ' + o.name + '?')) {
      o.eliminated = true;
      buildTabs();
      showReveal('Eliminated', '<div style="font-size:18px; font-weight:800;">' + o.name + ' eliminated</div>', '');
      globalHistory(o.name + ' eliminated');
      setTimeout(hideReveal, 1500);
    }
  });

  // ========== End Game ==========
  $('btn-global-end').addEventListener('click', function() {
    var list = $('end-op-list');
    list.innerHTML = '';
    opponents.forEach(function(o){
      var card = document.createElement('div');
      card.className = 'op-end-card';
      card.innerHTML =
        '<div class="op-name"><span style="width:10px;height:10px;border-radius:50%;display:inline-block;background:' + o.color + ';"></span>' + escapeHtml(o.name) + (o.eliminated ? ' <span style="color:var(--danger);font-size:12px;">(OUT)</span>' : '') + '</div>' +
        '<div class="stats-grid">' +
          '<div class="stat-card"><div class="num">' + o.gunkDrawnTotal + '</div><div class="desc">Gunk Drawn</div></div>' +
          '<div class="stat-card"><div class="num">' + o.gunkCycledTotal + '</div><div class="desc">Gunk Cycled</div></div>' +
          '<div class="stat-card"><div class="num">' + o.handGunk + '</div><div class="desc">Gunk Stuck</div></div>' +
          '<div class="stat-card"><div class="num">' + o.cardsRemovedTotal + '</div><div class="desc">Cards Removed</div></div>' +
        '</div>' +
        '<div class="seed-display" style="margin-top:8px;">Seed: ' + o.seed + '</div>';
      list.appendChild(card);
    });
    $('end-seed').textContent = 'Final Seeds shown above';
    showScreen('end');
  });

  $('btn-new').addEventListener('click', function() {
    hideReveal();
    $('setup-seed').textContent = '';
    opponents = [];
    showScreen('setup');
  });

  // ========== Add Gunk ==========
  function openPrompt(title, label, defaultVal, onConfirm) {
    $('prompt-title').textContent = title;
    $('prompt-label').textContent = label;
    $('prompt-input').value = defaultVal;
    $('prompt-overlay').classList.add('active');
    $('prompt-input').focus();
    var handler = function() {
      var val = parseInt($('prompt-input').value, 10) || 0;
      $('prompt-overlay').classList.remove('active');
      if (val > 0) onConfirm(val);
    };
    $('prompt-confirm').onclick = handler;
    $('prompt-input').onkeydown = function(e) { if (e.key === 'Enter') handler(); };
  }
  $('prompt-close').addEventListener('click', function() { $('prompt-overlay').classList.remove('active'); });
  $('prompt-cancel').addEventListener('click', function() { $('prompt-overlay').classList.remove('active'); });

  $('btn-add-gunk').addEventListener('click', function() {
    hideReveal();
    var o = op();
    if (o.eliminated) { showReveal('Eliminated', '<div style="color:var(--danger); font-weight:700;">' + o.name + ' is out</div>', ''); return; }
    openPrompt('Add Gunk', 'How many Gunk cards to add to ' + o.name + '?', '3', function(count) {
      for (var i=0;i<count;i++) o.library.push({ id: Date.now()+i, type: 'gunk' });
      var seedNum = (Math.floor(Math.random() * 0xFFFFFFFF) >>> 0);
      var seedHex = seedNum.toString(16).toUpperCase().padStart(8,'0');
      o.seed = seedHex;
      var rng = mulberry32(seedNum);
      shuffleInPlace(o.library, rng);
      logOp('Added ' + count + ' Gunk and reshuffled (Seed: ' + seedHex + ')');
      showReveal('Gunk Added', cardArtHTML('gunk', 'large') + '<div class="seed-display" style="margin-top:8px;">+' + count + ' GUNK &middot; Seed: ' + seedHex + '</div>', '');
      setTimeout(hideReveal, 2000);
      updateHeader();
    });
  });

  // ========== Panel look button ==========
  $('panel-look').addEventListener('click', function() {
    if (panelMode === 'surveil') doSurveilLook();
    else if (panelMode === 'scry') doScryLook();
    else if (panelMode === 'mill') doMillLook();
  });

  $('panel-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') $('panel-look').click();
  });

  document.addEventListener('focusin', function(e){ if(e.target.tagName==='INPUT') e.target.style.fontSize='16px'; });

})();
</script>
</body>
</html>
